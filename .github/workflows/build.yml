name: Build Packages

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  linux-appimage:
    name: Linux AppImage
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            cmake \
            ninja-build \
            build-essential \
            clang \
            qt6-base-dev \
            qt6-charts-dev \
            qt6-tools-dev \
            libqt6sql6-sqlite \
            patchelf \
            wget

      - name: Install AppImageTool
        run: |
          wget -O appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage

          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/appimagetool

      - name: Configure
        run: |
          cmake --preset github-linux-appimage

      - name: Build
        run: |
          cmake --build --preset github-linux-appimage

      - name: Package
        run: |
          cd build/github-linux-appimage
          cpack

      - name: List generated files
        run: |
          find . -type f | grep AppImage || true

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: FitlyzerC-AppImage
          path: |
            **/*.AppImage

  windows-nsis:
    name: Windows NSIS
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          host: "windows"
          target: "desktop"
          arch: "win64_mingw"
          version: "6.9.0"
          modules: "qtcharts"

      - name: Configure
        run: |
          cmake --preset github-windows-nsis

      - name: Build
        run: |
          cmake --build --preset github-windows-nsis

      - name: Package
        run: |
          cd build/github-windows-nsis
          cpack -C Release

      - name: List generated files
        shell: pwsh
        run: |
          Get-ChildItem -Recurse

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: FitlyzerC-Windows-Installer
          path: |
            **/*Setup*.exe

  macos-dmg:
    name: macOS DMG
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          host: "mac"
          target: "desktop"
          arch: "clang_64"
          version: "6.9.0"
          modules: "qtcharts"

      - name: Verify Qt Charts
        run: |
          echo "QT_ROOT_DIR=${QT_ROOT_DIR}"
          test -f "${QT_ROOT_DIR}/lib/cmake/Qt6Charts/Qt6ChartsConfig.cmake"

      - name: Show compiler
        run: |
          which clang
          which clang++
          clang --version
          clang++ --version

      - name: Configure
        run: |
          cmake --preset github-macos-dmg

      - name: Build
        run: |
          cmake --build --preset github-macos-dmg

      - name: Package
        run: |
          cd build/github-macos-dmg
          cpack

      - name: List generated files
        run: |
          find . -type f | grep dmg || true

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: FitlyzerC-macOS-DMG
          path: build/github-macos-dmg/FitlyzerC.dmg
          compression-level: 0
          
